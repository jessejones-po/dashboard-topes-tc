name: Regenerar Dashboards

on:
  push:
    branches: [main]
    paths:
      - 'data/ordenes.csv'
      - 'topes-config.json'
      - 'scripts/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generar dashboards
        run: npm run generate

      - name: Commit y push HTMLs actualizados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html ejecutivo/index.html
          if git diff --staged --quiet; then
            echo "Sin cambios en los dashboards"
          else
            git commit -m "chore: regenerar dashboards con datos actualizados [skip ci]"
            git push
          fi
